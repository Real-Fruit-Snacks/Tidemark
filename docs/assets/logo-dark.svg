<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: mauve to pink -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cba6f7"/>
      <stop offset="40%" stop-color="#cba6f7"/>
      <stop offset="100%" stop-color="#f5c2e7"/>
    </linearGradient>

    <!-- Accent gradient: pink to mauve -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5c2e7"/>
      <stop offset="100%" stop-color="#cba6f7"/>
    </linearGradient>

    <!-- Icon gradient: vertical -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cba6f7"/>
      <stop offset="50%" stop-color="#cba6f7"/>
      <stop offset="100%" stop-color="#f5c2e7"/>
    </linearGradient>

    <!-- Faint outer glow -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#cba6f7" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.4"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#cba6f7" opacity="0.04"/>

    <!-- === VARIABLE MARKERS === -->

    <!-- Horizontal baseline -->
    <line x1="44" y1="70" x2="116" y2="70" stroke="url(#g1)" stroke-width="1.2" opacity="0.6"/>

    <!-- Markers above the line (flags pointing up) -->
    <!-- Flag 1 — left -->
    <line x1="56" y1="70" x2="56" y2="42" stroke="#cba6f7" stroke-width="1.3" stroke-linecap="round" opacity="0.75"/>
    <polygon points="56,42 56,52 64,47" fill="#cba6f7" opacity="0.5"/>

    <!-- Flag 2 — center-left -->
    <line x1="76" y1="70" x2="76" y2="48" stroke="url(#g1)" stroke-width="1.2" stroke-linecap="round" opacity="0.65"/>
    <polygon points="76,48 76,56 84,52" fill="#f5c2e7" opacity="0.45"/>

    <!-- Flag 3 — right -->
    <line x1="100" y1="70" x2="100" y2="36" stroke="#f5c2e7" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
    <polygon points="100,36 100,46 108,41" fill="#cba6f7" opacity="0.5"/>

    <!-- Markers below the line (flags pointing down) -->
    <!-- Flag 4 — center -->
    <line x1="88" y1="70" x2="88" y2="90" stroke="#cba6f7" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    <polygon points="88,90 88,82 96,86" fill="#f5c2e7" opacity="0.4"/>

    <!-- Flag 5 — left-center -->
    <line x1="66" y1="70" x2="66" y2="96" stroke="url(#g1)" stroke-width="1.1" stroke-linecap="round" opacity="0.55"/>
    <polygon points="66,96 66,88 74,92" fill="#cba6f7" opacity="0.4"/>

    <!-- Small accent dots at flag tips -->
    <circle cx="56" cy="42" r="1.5" fill="#cba6f7" opacity="0.6"/>
    <circle cx="76" cy="48" r="1.3" fill="#f5c2e7" opacity="0.5"/>
    <circle cx="100" cy="36" r="1.5" fill="#f5c2e7" opacity="0.55"/>
    <circle cx="88" cy="90" r="1.2" fill="#cba6f7" opacity="0.45"/>
    <circle cx="66" cy="96" r="1.2" fill="#f5c2e7" opacity="0.4"/>

    <!-- Decorative substitution brackets -->
    <text x="46" y="60" font-family="monospace" font-size="8" fill="#cba6f7" opacity="0.2">{</text>
    <text x="110" y="84" font-family="monospace" font-size="8" fill="#f5c2e7" opacity="0.2">}</text>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#cba6f7" opacity="0.3"/>
    <circle cx="80" cy="134" r="2" fill="#f5c2e7" opacity="0.3"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "TIDEMARK" -->
  <text x="415" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="62" font-weight="800" letter-spacing="14"
        fill="url(#g1)" text-anchor="middle">TIDEMARK</text>

  <!-- Thin separator line -->
  <line x1="280" y1="128" x2="550" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.25"/>

  <!-- Tagline -->
  <text x="415" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#7f849c" text-anchor="middle">OBSIDIAN VARIABLE SUBSTITUTION</text>

  <!-- Descriptor -->
  <text x="415" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#585b70" text-anchor="middle">TYPESCRIPT  ·  YAML  ·  MARKDOWN</text>
</svg>
