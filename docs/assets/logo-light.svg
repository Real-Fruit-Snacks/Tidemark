<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="220" fill="#eff1f5" rx="8"/>

  <!-- Hexagonal Frame -->
  <g transform="translate(100, 110)" filter="url(#softGlow)">
    <polygon points="0,-72 62.4,-36 62.4,36 0,72 -62.4,36 -62.4,-36"
             fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.4"/>

    <!-- Center node -->
    <circle cx="0" cy="0" r="2" fill="#7c3aed" opacity="0.6"/>
    <!-- Entry node (left) -->
    <circle cx="-62.4" cy="0" r="2" fill="#7c3aed" opacity="0.5"/>
    <!-- Exit node (right) -->
    <circle cx="62.4" cy="0" r="2" fill="#7c3aed" opacity="0.5"/>

    <!-- Particle dots on hex edges -->
    <circle cx="31.2" cy="-54" r="1.2" fill="#ec4899" opacity="0.35"/>
    <circle cx="-31.2" cy="-54" r="1.2" fill="#7c3aed" opacity="0.3"/>
    <circle cx="31.2" cy="54" r="1.2" fill="#ec4899" opacity="0.3"/>
    <circle cx="-31.2" cy="54" r="1.2" fill="#7c3aed" opacity="0.35"/>
    <circle cx="-55" cy="-18" r="1" fill="#ec4899" opacity="0.25"/>
    <circle cx="55" cy="18" r="1" fill="#7c3aed" opacity="0.25"/>

    <!-- LOGOMARK: Variable Markers -->
    <!-- Horizontal baseline -->
    <line x1="-36" y1="0" x2="36" y2="0" stroke="url(#accentGrad)" stroke-width="1.2" opacity="0.6"/>

    <!-- Markers above the line (flags pointing up) -->
    <!-- Flag 1 — left -->
    <line x1="-24" y1="0" x2="-24" y2="-28" stroke="#7c3aed" stroke-width="1.3" stroke-linecap="round" opacity="0.75"/>
    <polygon points="-24,-28 -24,-18 -16,-23" fill="#7c3aed" opacity="0.5"/>

    <!-- Flag 2 — center-left -->
    <line x1="-4" y1="0" x2="-4" y2="-22" stroke="url(#accentGrad)" stroke-width="1.2" stroke-linecap="round" opacity="0.65"/>
    <polygon points="-4,-22 -4,-14 4,-18" fill="#ec4899" opacity="0.45"/>

    <!-- Flag 3 — right -->
    <line x1="20" y1="0" x2="20" y2="-34" stroke="#ec4899" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
    <polygon points="20,-34 20,-24 28,-29" fill="#7c3aed" opacity="0.5"/>

    <!-- Markers below the line (flags pointing down) -->
    <!-- Flag 4 — center -->
    <line x1="8" y1="0" x2="8" y2="20" stroke="#7c3aed" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    <polygon points="8,20 8,12 16,16" fill="#ec4899" opacity="0.4"/>

    <!-- Flag 5 — left-center -->
    <line x1="-14" y1="0" x2="-14" y2="26" stroke="url(#accentGrad)" stroke-width="1.1" stroke-linecap="round" opacity="0.55"/>
    <polygon points="-14,26 -14,18 -6,22" fill="#7c3aed" opacity="0.4"/>

    <!-- Small accent dots at flag tips -->
    <circle cx="-24" cy="-28" r="1.5" fill="#7c3aed" opacity="0.6"/>
    <circle cx="-4" cy="-22" r="1.3" fill="#ec4899" opacity="0.5"/>
    <circle cx="20" cy="-34" r="1.5" fill="#ec4899" opacity="0.55"/>
    <circle cx="8" cy="20" r="1.2" fill="#7c3aed" opacity="0.45"/>
    <circle cx="-14" cy="26" r="1.2" fill="#ec4899" opacity="0.4"/>

    <!-- Decorative substitution brackets -->
    <text x="-34" y="-10" font-family="monospace" font-size="8" fill="#7c3aed" opacity="0.2">{</text>
    <text x="30" y="14" font-family="monospace" font-size="8" fill="#ec4899" opacity="0.2">}</text>
  </g>

  <!-- Typography -->
  <g transform="translate(200, 0)">
    <!-- Project Name -->
    <text x="0" y="92" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="62" font-weight="800" fill="url(#textGrad)" letter-spacing="3">TIDEMARK</text>

    <!-- Separator line -->
    <line x1="0" y1="108" x2="370" y2="108" stroke="url(#accentGrad)" stroke-width="0.8" opacity="0.4"/>

    <!-- Tagline -->
    <text x="0" y="132" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="11.5" fill="#4c4f69" letter-spacing="2" opacity="0.85">OBSIDIAN VARIABLE SUBSTITUTION</text>

    <!-- Descriptor -->
    <text x="0" y="152" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="9" fill="#6c6f85" letter-spacing="2.5" opacity="0.6">TYPESCRIPT · YAML · MARKDOWN</text>
  </g>
</svg>