name: Bug Report
description: Report a bug in Tidemark
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Tidemark Version
      placeholder: e.g., 1.0.0
    validations:
      required: true
  - type: input
    id: obsidian
    attributes:
      label: Obsidian Version
      placeholder: e.g., 1.5.0
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
