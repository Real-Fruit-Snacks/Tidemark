<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cba6f7"/>
      <stop offset="40%" stop-color="#89b4fa"/>
      <stop offset="70%" stop-color="#94e2d5"/>
      <stop offset="100%" stop-color="#a6e3a1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.8" fill="#313244" opacity="0.5"/>
  </pattern>
  <rect width="800" height="200" rx="16" fill="url(#dots)"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="799" height="199" rx="16" fill="none" stroke="#45475a" stroke-width="1"/>

  <!-- Document icon -->
  <g transform="translate(60, 40)">
    <rect width="72" height="90" rx="8" fill="#313244" opacity="0.8"/>
    <rect x="1" y="1" width="70" height="88" rx="7" fill="none" stroke="#45475a" stroke-width="1"/>

    <!-- Frontmatter dashes -->
    <line x1="12" y1="14" x2="36" y2="14" stroke="#6c7086" stroke-width="3" stroke-linecap="round"/>
    <rect x="12" y="22" width="24" height="3" rx="1.5" fill="#89b4fa" opacity="0.5"/>
    <rect x="40" y="22" width="20" height="3" rx="1.5" fill="#a6e3a1" opacity="0.5"/>
    <rect x="12" y="30" width="18" height="3" rx="1.5" fill="#89b4fa" opacity="0.5"/>
    <rect x="34" y="30" width="26" height="3" rx="1.5" fill="#a6e3a1" opacity="0.5"/>
    <line x1="12" y1="40" x2="36" y2="40" stroke="#6c7086" stroke-width="3" stroke-linecap="round"/>

    <!-- Variable pills -->
    <rect x="8" y="50" width="56" height="14" rx="4" fill="#a6e3a1" opacity="0.25"/>
    <rect x="8" y="50" width="56" height="14" rx="4" fill="none" stroke="#a6e3a1" stroke-width="0.8" opacity="0.6"/>
    <text x="14" y="61" font-family="monospace" font-size="9" font-weight="bold" fill="#a6e3a1">{{var}}</text>

    <rect x="8" y="68" width="56" height="14" rx="4" fill="#f38ba8" opacity="0.25"/>
    <rect x="8" y="68" width="56" height="14" rx="4" fill="none" stroke="#f38ba8" stroke-width="0.8" opacity="0.6"/>
    <text x="14" y="79" font-family="monospace" font-size="9" font-weight="bold" fill="#f38ba8">{{new}}</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(148, 78)">
    <line x1="0" y1="12" x2="28" y2="12" stroke="#cba6f7" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M 24 6 L 32 12 L 24 18" stroke="#cba6f7" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>

  <!-- Resolved document icon -->
  <g transform="translate(190, 40)">
    <rect width="72" height="90" rx="8" fill="#313244" opacity="0.8"/>
    <rect x="1" y="1" width="70" height="88" rx="7" fill="none" stroke="#45475a" stroke-width="1"/>

    <line x1="12" y1="14" x2="36" y2="14" stroke="#6c7086" stroke-width="3" stroke-linecap="round"/>
    <rect x="12" y="22" width="24" height="3" rx="1.5" fill="#89b4fa" opacity="0.5"/>
    <rect x="40" y="22" width="20" height="3" rx="1.5" fill="#a6e3a1" opacity="0.5"/>
    <rect x="12" y="30" width="18" height="3" rx="1.5" fill="#89b4fa" opacity="0.5"/>
    <rect x="34" y="30" width="26" height="3" rx="1.5" fill="#a6e3a1" opacity="0.5"/>
    <line x1="12" y1="40" x2="36" y2="40" stroke="#6c7086" stroke-width="3" stroke-linecap="round"/>

    <!-- Resolved values -->
    <rect x="8" y="50" width="56" height="14" rx="4" fill="#45475a" opacity="0.6"/>
    <text x="14" y="61" font-family="monospace" font-size="9" font-weight="bold" fill="#cdd6f4" opacity="0.9">10.10.1</text>

    <rect x="8" y="68" width="56" height="14" rx="4" fill="#45475a" opacity="0.6"/>
    <text x="14" y="79" font-family="monospace" font-size="9" font-weight="bold" fill="#cdd6f4" opacity="0.9">admin</text>
  </g>

  <!-- Title text -->
  <text x="310" y="72" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="40" font-weight="bold" fill="url(#titleGrad)" letter-spacing="-0.5">
    Tidemark
  </text>

  <!-- Subtitle -->
  <text x="310" y="105" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#a6adc8">
    Frontmatter variables that fill themselves
  </text>

  <!-- Tag pills -->
  <g transform="translate(310, 125)">
    <rect width="80" height="22" rx="11" fill="#313244"/>
    <rect width="80" height="22" rx="11" fill="none" stroke="#45475a" stroke-width="0.8"/>
    <text x="40" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#bac2de" text-anchor="middle">Markdown</text>

    <rect x="90" y="0" width="90" height="22" rx="11" fill="#313244"/>
    <rect x="90" y="0" width="90" height="22" rx="11" fill="none" stroke="#45475a" stroke-width="0.8"/>
    <text x="135" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#bac2de" text-anchor="middle">Templating</text>

    <rect x="190" y="0" width="80" height="22" rx="11" fill="#313244"/>
    <rect x="190" y="0" width="80" height="22" rx="11" fill="none" stroke="#45475a" stroke-width="0.8"/>
    <text x="230" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#bac2de" text-anchor="middle">Pentesting</text>

    <rect x="280" y="0" width="55" height="22" rx="11" fill="#313244"/>
    <rect x="280" y="0" width="55" height="22" rx="11" fill="none" stroke="#45475a" stroke-width="0.8"/>
    <text x="307" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#bac2de" text-anchor="middle">CTF</text>
  </g>
</svg>
